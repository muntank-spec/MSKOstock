<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>나의 주식 비서 Pro</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="주식비서">
    <meta name="theme-color" content="#0b0f19">

    <style>
        @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');

        /* ── 디자인 토큰 ── */
        :root {
            --bg: #060913;
            --card: rgba(21, 27, 43, 0.75);
            --card2: rgba(26, 33, 51, 0.85);
            --primary: #4f46e5;
            --primary-h: #6366f1;
            --primary-glow: rgba(99, 102, 241, 0.25);
            --border: rgba(255, 255, 255, 0.08);
            --border2: rgba(255, 255, 255, 0.15);
            --text: #f8fafc;
            --text-sub: #94a3b8;
            --text-dim: #4a5568;
            --red: #f43f5e;
            --blue: #3b82f6;
            --green: #10b981;
            --green-dim: rgba(16,185,129,.12);
            --amber: #f59e0b;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }

        body {
            font-family: 'Pretendard', -apple-system, sans-serif;
            background: radial-gradient(circle at top right, #0f162a, var(--bg));
            color: var(--text);
            padding: 16px;
            padding-bottom: 72px;
            min-height: 100vh;
        }

        .container { max-width: 600px; margin: 0 auto; }

        /* ── 헤더 ── */
        .header { text-align: center; margin: 24px 0 20px; }
        .header h1 {
            font-size: 1.65rem; font-weight: 900;
            background: linear-gradient(135deg, #c7d2fe, #818cf8, #4f46e5);
            -webkit-background-clip: text; background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -0.02em;
            margin-bottom: 6px;
        }
        .header p { color: var(--text-sub); font-size: 0.82rem; }

        /* ── 공통 카드 ── */
        .card {
            background: var(--card);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            padding: 22px;
            border-radius: 24px;
            margin-bottom: 18px;
            border: 1px solid var(--border);
            box-shadow: 0 10px 30px rgba(0,0,0,0.35), inset 0 1px 0 0 rgba(255,255,255,0.05);
            transition: transform 0.3s cubic-bezier(0.16, 1, 0.3, 1), box-shadow 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .card:hover {
            box-shadow: 0 14px 40px rgba(0,0,0,0.45), inset 0 1px 0 0 rgba(255,255,255,0.08);
        }

        /* ── 요약 바 ── */
        .summary-bar {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 16px;
        }
        .summary-cell {
            background: rgba(0,0,0,.25);
            padding: 13px 15px;
            border-radius: 14px;
            border: 1px solid var(--border);
        }
        .summary-cell .label { color: var(--text-sub); font-size: 0.75rem; margin-bottom: 4px; }
        .summary-cell .value { font-weight: 800; font-size: 1.05rem; }

        /* ── 입력 폼 ── */
        .search-wrap { position: relative; margin-bottom: 10px; }
        input[type=text], input[type=number] {
            width: 100%; 
            background: rgba(15, 23, 42, 0.6); 
            border: 1px solid var(--border);
            color: var(--text); 
            padding: 14px 16px; 
            border-radius: 12px;
            font-size: 0.95rem; 
            outline: none; 
            font-family: inherit;
            transition: border-color 0.25s ease, box-shadow 0.25s ease, background-color 0.25s ease;
        }
        input:focus { 
            border-color: var(--primary-h); 
            background: rgba(15, 23, 42, 0.9);
            box-shadow: 0 0 0 4px var(--primary-glow);
        }
        .input-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px; }
        .input-label { font-size: 0.72rem; color: var(--text-sub); margin-bottom: 4px; }

        /* ── 자동완성 ── */
        #autocompleteList {
            position: absolute; top: calc(100% + 6px); left: 0; right: 0;
            background: #111726; border: 1px solid var(--primary-h);
            border-radius: 14px; z-index: 9999;
            max-height: 280px; overflow-y: auto; display: none;
            box-shadow: 0 12px 40px rgba(0,0,0,.7);
            backdrop-filter: blur(10px);
        }
        #autocompleteList::-webkit-scrollbar { width: 6px; }
        #autocompleteList::-webkit-scrollbar-track { background: transparent; }
        #autocompleteList::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.1); border-radius: 3px; }
        .ac-item {
            padding: 13px 16px; cursor: pointer;
            border-bottom: 1px solid rgba(255,255,255,0.03);
            display: flex; justify-content: space-between; align-items: center;
            transition: background 0.15s, padding-left 0.15s;
        }
        .ac-item:last-child { border-bottom: none; }
        .ac-item:active, .ac-item:hover { 
            background: rgba(99,102,241,.15); 
            padding-left: 20px;
        }
        .ac-code { color: #818cf8; font-size: 0.78rem; font-weight: 800;
            background: rgba(99,102,241,0.12); padding: 2px 7px; border-radius: 5px; }

        /* ── 버튼 ── */
        .btn-main {
            width: 100%; 
            padding: 15px; 
            background: linear-gradient(135deg, var(--primary), var(--primary-h));
            border: none; 
            color: white; 
            border-radius: 12px;
            font-weight: 800; 
            font-size: 0.97rem; 
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s ease, filter 0.2s ease;
            box-shadow: 0 4px 12px rgba(79, 70, 229, 0.3);
            font-family: inherit;
        }
        .btn-main:hover {
            transform: translateY(-1px);
            box-shadow: 0 6px 20px rgba(79, 70, 229, 0.45);
            filter: brightness(1.05);
        }
        .btn-main:active { transform: translateY(1px); }
        .btn-sub {
            padding: 7px 14px; background: rgba(255,255,255,.04);
            border: 1px solid var(--border); color: var(--text);
            border-radius: 8px; font-weight: 600; cursor: pointer;
            font-size: 0.82rem; font-family: inherit; transition: all 0.2s ease;
        }
        .btn-sub:hover { background: rgba(255,255,255,.08); border-color: rgba(255,255,255,0.15); transform: translateY(-1px); }
        .btn-sub:active { transform: translateY(0); }

        /* ── 종목 카드 ── */
        .stock-item {
            background: rgba(255,255,255,.02);
            border-radius: 20px; padding: 18px;
            margin-bottom: 12px; border: 1px solid var(--border);
            transition: all 0.25s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .stock-item:hover { 
            background: rgba(255,255,255,.035); 
            border-color: rgba(255,255,255,0.12);
            transform: scale(1.01) translateY(-2px);
        }

        .order-btns { display: flex; flex-direction: column; gap: 3px; margin-right: 11px; }
        .order-btn {
            background: rgba(255,255,255,0.03); border: 1px solid var(--border); color: var(--text-sub);
            width: 22px; height: 22px; border-radius: 5px; font-size: 9px;
            cursor: pointer; transition: all 0.15s ease;
            display: flex; align-items: center; justify-content: center;
        }
        .order-btn:hover { background: rgba(255,255,255,0.08); color: white; border-color: rgba(255,255,255,0.2); }

        /* ── 차트 영역 ── */
        .chart-area { 
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.4s cubic-bezier(0.16, 1, 0.3, 1); 
            text-align: center; 
        }
        .chart-area.open { 
            max-height: 520px; 
        }
        .chart-area-inner {
            padding-top: 14px;
        }
        .chart-img {
            width: 100%; border-radius: 12px;
            filter: invert(93%) hue-rotate(180deg) brightness(1.05) contrast(1.1);
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.05);
            transition: transform 0.3s ease;
        }
        .chart-img:hover { transform: scale(1.015); }
        .period-row { display: flex; justify-content: center; gap: 7px; margin-bottom: 10px; }
        .period-btn {
            background: rgba(255,255,255,.03); border: 1px solid var(--border);
            color: var(--text-sub); padding: 5px 14px; border-radius: 20px;
            font-size: 0.82rem; cursor: pointer; font-weight: 700; font-family: inherit;
            transition: all .15s;
        }
        .period-btn:hover { background: rgba(255,255,255,0.08); color: var(--text); }
        .period-btn.active { 
            background: var(--primary); 
            color: white; 
            border-color: var(--primary); 
            box-shadow: 0 2px 8px rgba(99, 102, 241, 0.4);
        }

        /* ── 액션 버튼 ── */
        .actions { display: flex; gap: 7px; margin-top: 13px; }
        .action-btn {
            flex: 1; padding: 10px 0; border-radius: 10px; font-weight: 800;
            font-size: 0.78rem; cursor: pointer; border: none; font-family: inherit;
            transition: all 0.2s ease;
        }
        .action-btn:hover { filter: brightness(1.15); transform: translateY(-1px); }
        .action-btn:active { transform: translateY(0); }

        /* ── 모달 ── */
        .modal-overlay {
            display: none; position: fixed;
            inset: 0; background: rgba(3, 7, 18, 0.8);
            z-index: 500; backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            animation: fadeIn 0.25s ease;
        }
        .modal {
            display: none; position: fixed;
            top: 50%; left: 50%; transform: translate(-50%,-50%);
            width: 92%; max-width: 400px;
            background: #111726; border: 1px solid var(--border);
            border-radius: 28px; padding: 24px; z-index: 501;
            max-height: 90vh; overflow-y: auto;
            box-shadow: 0 20px 50px rgba(0,0,0,0.6);
            animation: modalScaleUp 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes modalScaleUp { 
            from { transform: translate(-50%, -46%) scale(0.95); opacity: 0; } 
            to { transform: translate(-50%, -50%) scale(1); opacity: 1; } 
        }

        /* ── 토스트 ── */
        #toast {
            position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%);
            background: rgba(30, 45, 64, 0.85); border: 1px solid var(--green);
            color: var(--text); padding: 10px 20px; border-radius: 30px;
            font-size: 0.88rem; font-weight: 600; z-index: 999;
            opacity: 0; transition: opacity .3s; pointer-events: none; white-space: nowrap;
            backdrop-filter: blur(10px);
        }
        #toast.show { opacity: 1; }

        /* ── 에러 배너 ── */
        #errBanner {
            display: none; background: rgba(244,63,94,.12);
            border: 1px solid rgba(244,63,94,.4); color: var(--red);
            padding: 10px 14px; border-radius: 10px; font-size: 0.82rem;
            margin-bottom: 12px;
        }

        /* ── 섹션 타이틀 ── */
        .section-title {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 15px;
        }
        .section-title span { font-weight: 800; font-size: 1.05rem; }

        .footer { text-align: center; padding: 20px 0 0; color: var(--text-sub); font-size: 0.78rem; border-top: 1px solid rgba(255,255,255,0.02); margin-top: 20px; }

        /* ── 물타기 결과 ── */
        .water-result {
            display: none; text-align: center; padding: 16px;
            background: var(--bg); border-radius: 12px;
            border: 1px solid var(--green); margin-bottom: 14px;
        }

        /* ── 빈 상태 ── */
        .empty-state {
            text-align: center; padding: 40px 20px;
            color: var(--text-sub); font-size: 0.9rem;
        }
        .empty-state .icon { font-size: 2.5rem; margin-bottom: 10px; }

        /* ── 진단 모달 내부 ── */
        .edit-section {
            background: rgba(0,0,0,.25); padding: 14px;
            border-radius: 12px; margin-bottom: 18px;
            border: 1px solid var(--border);
        }
        .edit-section label {
            font-size: 0.82rem; color: var(--text-sub);
            font-weight: 700; margin-bottom: 8px; display: block;
        }

        /* ── 삭제 취소 스낵바 ── */
        #undoBar {
            display: none; position: fixed; bottom: 80px; left: 50%;
            transform: translateX(-50%);
            background: rgba(30, 45, 64, 0.85); border: 1px solid var(--amber);
            color: var(--text); padding: 10px 16px; border-radius: 30px;
            font-size: 0.85rem; font-weight: 600; z-index: 999;
            align-items: center; gap: 12px; white-space: nowrap;
            backdrop-filter: blur(10px);
        }
        #undoBar button {
            background: var(--amber); color: #000; border: none;
            border-radius: 20px; padding: 4px 12px; font-weight: 800;
            font-size: 0.8rem; cursor: pointer; font-family: inherit;
        }

        /* ── 갱신 상태 도트 ── */
        .live-dot {
            display: inline-block; width: 7px; height: 7px;
            background: var(--green); border-radius: 50%;
            margin-right: 5px; vertical-align: middle;
        }
        .live-dot.stale { background: var(--amber); }
    </style>
</head>
<body>
<div class="container">

    <div class="header">
        <h1>📈 나의 주식 비서 Pro</h1>
        <p>🇰🇷 국내 &amp; 🇺🇸 미국 통합 포트폴리오 · v7.0.0</p>
    </div>

    <!-- ── 포트폴리오 섹션 ── -->
    <div class="card">
        <div class="section-title">
            <div style="display:flex;align-items:center;gap:8px;">
                <span>💼 포트폴리오</span>
                <button class="btn-sub" onclick="refreshAll()" id="refreshBtn">🔄 갱신</button>
            </div>
            <div style="text-align:right;">
                <div id="totalYield" style="font-size:1.3rem;font-weight:900;">0.00%</div>
                <div id="lastUpdate" style="font-size:0.7rem;color:var(--text-sub);"></div>
            </div>
        </div>

        <div id="errBanner"></div>

        <div class="summary-bar">
            <div class="summary-cell">
                <div class="label">총 투자금액 <span id="exRateLabel" style="font-size:0.68rem;color:#818cf8;"></span></div>
                <div class="value" id="totalInv">0원</div>
            </div>
            <div class="summary-cell">
                <div class="label">총 평가손익</div>
                <div class="value" id="totalPL">0원</div>
            </div>
        </div>

        <div id="stockList"></div>
    </div>

    <!-- ── 종목 추가 섹션 ── -->
    <div class="card">
        <div class="section-title"><span>📝 종목 추가</span></div>

        <div class="search-wrap">
            <input type="text" id="sName" placeholder="🔍 종목명 입력 (자동완성 지원)"
                oninput="onSearchInput(this.value)" autocomplete="off">
            <div id="autocompleteList"></div>
        </div>
        <div class="search-wrap">
            <input type="text" id="sCode" placeholder="종목코드 (자동 입력됨)">
        </div>
        <div class="input-grid">
            <div>
                <div class="input-label">매수 평단가</div>
                <input type="number" id="sAvg" placeholder="평단가">
            </div>
            <div>
                <div class="input-label">보유 수량</div>
                <input type="number" id="sQty" placeholder="수량">
            </div>
        </div>

        <button class="btn-main" onclick="addStock()" id="addBtn">포트폴리오에 저장</button>
    </div>

    <div class="footer">
        <p>v7.0.0 · 2026</p>
        <p style="margin-top:6px;font-size:0.72rem;color:var(--text-dim);">투자는 본인 책임입니다. 정보 제공 목적의 앱입니다.</p>
    </div>
</div>

<!-- ── 토스트 ── -->
<div id="toast"></div>

<!-- ── 삭제 취소 바 ── -->
<div id="undoBar">
    <span id="undoText"></span>
    <button onclick="undoDelete()">되돌리기</button>
</div>

<!-- ── 모달 오버레이 ── -->
<div class="modal-overlay" id="overlay" onclick="closeModals()"></div>

<!-- ── 진단/수정 모달 ── -->
<div class="modal" id="aModal">
    <h3 id="aModalTitle" style="margin-bottom:4px;"></h3>
    <div id="aModalSub" style="color:var(--text-sub);font-size:0.83rem;margin-bottom:18px;"></div>

    <div class="edit-section">
        <label>정보 수정</label>
        <input type="text" id="uCode" placeholder="종목코드" style="margin-bottom:8px;">
        <div style="display:flex;gap:8px;margin-bottom:8px;">
            <input type="number" id="uAvg" placeholder="평단가" style="flex:1;">
            <input type="number" id="uQty" placeholder="수량" style="flex:1;">
        </div>
        <div style="display:flex;gap:8px;">
            <input type="number" id="uPrice" placeholder="현재가" style="flex:1;">
            <button onclick="saveEdit()" style="padding:0 18px;background:var(--primary);color:white;border-radius:10px;border:none;font-weight:800;cursor:pointer;font-family:inherit;">저장</button>
        </div>
    </div>

    <button onclick="openGemini()" class="btn-main" style="margin-bottom:10px;">✨ AI 진단 (Gemini로 열기)</button>
    <button onclick="closeModals()" style="width:100%;padding:13px;background:transparent;border:none;color:var(--text-sub);font-weight:700;cursor:pointer;font-family:inherit;">닫기</button>
</div>

<!-- ── 물타기 모달 ── -->
<div class="modal" id="waterModal">
    <h3 style="margin-bottom:4px;">💧 물타기 계산</h3>
    <p style="color:var(--text-sub);font-size:0.83rem;margin-bottom:18px;" id="waterName"></p>
    <input type="number" id="addMoney" placeholder="추가 투자 금액 (국내: 원 / 해외: 달러)"
        style="margin-bottom:14px;" oninput="calcWater()">
    <div class="water-result" id="waterResult">
        <div style="color:var(--text-sub);font-size:0.82rem;">예상 평단가</div>
        <div style="color:var(--green);font-size:1.55rem;font-weight:900;" id="wNewAvg">—</div>
        <div style="color:var(--text);font-size:0.88rem;margin-top:4px;" id="wBuyQty"></div>
    </div>
    <button onclick="closeModals()" class="btn-main" style="background:var(--border);">닫기</button>
</div>

<script>
// ═══════════════════════════════════════════
//  유틸리티
// ═══════════════════════════════════════════

function toast(msg, duration = 2400) {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.classList.add('show');
    setTimeout(() => el.classList.remove('show'), duration);
}

function showErr(msg) {
    const el = document.getElementById('errBanner');
    if (!msg) { el.style.display = 'none'; return; }
    el.textContent = msg;
    el.style.display = 'block';
}

// ── 안전한 localStorage 래퍼 ──
const Store = {
    get(key, fallback = null) {
        try { const v = localStorage.getItem(key); return v ? JSON.parse(v) : fallback; }
        catch { return fallback; }
    },
    set(key, value) {
        try { localStorage.setItem(key, JSON.stringify(value)); return true; }
        catch (e) {
            console.error('저장 실패:', e);
            toast('⚠️ 저장 공간이 부족합니다.');
            return false;
        }
    }
};

// ═══════════════════════════════════════════
//  상태
// ═══════════════════════════════════════════

let myStocks = Store.get('myStocks', []);
let exchangeRate = Store.get('exchangeRate', 1350);
let curIdx = -1;
let deletedStock = null;
let undoTimer = null;
let searchTimer = null;

// ═══════════════════════════════════════════
//  종목 DB — 오류 수정 완료
// ═══════════════════════════════════════════
const TOP_STOCKS = [
    // 국내 대형주
    {n:"삼성전자",c:"005930",f:"🇰🇷"},{n:"SK하이닉스",c:"000660",f:"🇰🇷"},{n:"LG에너지솔루션",c:"373220",f:"🇰🇷"},
    {n:"삼성바이오로직스",c:"207940",f:"🇰🇷"},{n:"현대차",c:"005380",f:"🇰🇷"},{n:"기아",c:"000270",f:"🇰🇷"},
    {n:"셀트리온",c:"068270",f:"🇰🇷"},{n:"POSCO홀딩스",c:"005490",f:"🇰🇷"},{n:"NAVER",c:"035420",f:"🇰🇷"},

const SMART_DICT = {
    "엘지":"LG","에스케이":"SK","케이티":"KT","씨제이":"CJ",
    "삼전":"삼성전자","카뱅":"카카오뱅크","현차":"현대차"
};
function autoCorrect(q) {
    let r = q;
    for (const [w,c] of Object.entries(SMART_DICT)) r = r.replaceAll(w, c);
    return r;
}

/**
 * CORS 우회 프록시 사용 시 외부 서버에 요청이 노출됩니다.
 * 프록시 순서: allorigins → codetabs
 */
async function fetchProxy(url, timeoutMs = 3000) {
    const proxies = [
        `https://api.allorigins.win/get?url=${encodeURIComponent(url)}&_=${Date.now()}`,
        `https://api.codetabs.com/v1/proxy/?quest=${url}&_=${Date.now()}`
    ];
    for (const proxy of proxies) {
        const ctrl = new AbortController();
        const tid = setTimeout(() => ctrl.abort(), timeoutMs);
        try {
            const res = await fetch(proxy, { signal: ctrl.signal, cache: 'no-store' });
            clearTimeout(tid);
            if (!res.ok) continue;
            const json = await res.json();
            return proxy.includes('allorigins') ? JSON.parse(json.contents) : json;
        } catch {
            clearTimeout(tid);
        }
    }
    throw new Error('네트워크 응답 없음');
}

async function updateExchangeRate() {
    try {
        const data = await fetchProxy('https://query1.finance.yahoo.com/v8/finance/chart/KRW=X?interval=1d&range=1d');
        const rate = data?.chart?.result?.[0]?.meta?.regularMarketPrice;
        if (rate && rate > 500) {
            exchangeRate = rate;
            Store.set('exchangeRate', exchangeRate);
        }
    } catch { /* 기존 캐시값 사용 */ }
}

async function getPrice(code) {
    const isKorea = /^\d{6}$/.test(code);
    const ticker = code.includes('@') ? code.split('@').pop() : code;

    if (isKorea) {
        const data = await fetchProxy(`https://m.stock.naver.com/api/stock/${ticker}/basic`);
        if (!data?.closePrice) throw new Error('데이터 없음');
        const price = parseInt(data.closePrice.replace(/,/g, ''), 10);
        const sign = data.compareToPreviousPrice?.code === '5' ? -1 : 1;
        const rawChg = parseInt((data.compareToPreviousClosePrice || '0').replace(/,/g, ''), 10);
        const change = Math.abs(rawChg) * sign;
        const rawRate = parseFloat((data.fluctuationsRatio || '0').replace(/,/g, ''));
        const changeRate = Math.abs(rawRate) * sign;
        return { price, name: data.stockName, change, changeRate };
    } else {
        const safe = ticker.replace(/-/g, '.');
        const data = await fetchProxy(`https://query1.finance.yahoo.com/v8/finance/chart/${safe}?interval=1d&range=2d`);
        const meta = data?.chart?.result?.[0]?.meta;
        if (!meta) throw new Error('야후 데이터 없음');
        const price = +meta.regularMarketPrice.toFixed(2);
        const prev = +meta.chartPreviousClose.toFixed(2);
        const change = +(price - prev).toFixed(2);
        const changeRate = +((change / prev) * 100).toFixed(2);
        return { price, name: ticker, change, changeRate };
    }
}

// 네이버 자동완성 (JSONP)
function naverSearch(query) {
    return new Promise(resolve => {
        const cb = 'navCb_' + Date.now();
        window[cb] = d => { resolve(d?.items?.[0] || []); delete window[cb]; };
        const s = document.createElement('script');
        s.src = `https://ac.finance.naver.com/ac?q=${encodeURIComponent(query)}&st=111&frm=stock&r_format=json&r_unicode=1&t_koreng=1&ans=2&_callback=${cb}`;
        s.onerror = () => resolve([]);
        document.head.appendChild(s);
        setTimeout(() => resolve([]), 2000);
    });
}

function onSearchInput(q) {
    clearTimeout(searchTimer);
    const list = document.getElementById('autocompleteList');
    if (!q.trim()) { list.style.display = 'none'; return; }

    list.innerHTML = '<div style="padding:14px;color:var(--text-sub);text-align:center;font-size:0.85rem;">⚡ 검색 중...</div>';
    list.style.display = 'block';

    searchTimer = setTimeout(() => runSearch(q, list), 280);
}

async function runSearch(q, list) {
    const smart = autoCorrect(q);
    const added = new Set();
    let html = '';

    // 1) 로컬 DB
    TOP_STOCKS
        .filter(s => s.n.toLowerCase().includes(smart.toLowerCase()) || s.c.toLowerCase().includes(smart.toLowerCase()))
        .forEach(s => {
            if (added.has(s.c)) return;
            html += acItem(s.f, s.n, s.c);
            added.add(s.c);
        });
    if (html) { list.innerHTML = html; bindAcItems(list); }

    // 2) 네이버 라이브
    try {
        const items = await naverSearch(smart);
        let changed = false;
        items.forEach(item => {
            const name = Array.isArray(item[0]) ? item[0][0] : item[0];
            const code = Array.isArray(item[1]) ? item[1][0] : item[1];
            if (added.has(code)) return;
            html += acItem('🇰🇷', name, code);
            added.add(code); changed = true;
        });
        if (changed) { list.innerHTML = html; bindAcItems(list); }
    } catch {}

    // 3) 야후 라이브
    try {
        const data = await fetchProxy(`https://query2.finance.yahoo.com/v1/finance/search?q=${encodeURIComponent(smart)}&quotesCount=5`, 4000);
        let changed = false;
        (data?.quotes || []).forEach(q => {
            if (!['EQUITY','ETF'].includes(q.quoteType)) return;
            if (q.symbol.includes('.KS') || q.symbol.includes('.KQ')) return;
            if (added.has(q.symbol)) return;
            const name = q.shortname || q.longname || q.symbol;
            html += acItem('🇺🇸', name.replace(/'/g, '&#39;'), q.symbol);
            added.add(q.symbol); changed = true;
        });
        if (changed) { list.innerHTML = html; bindAcItems(list); }
    } catch {}

    if (!html) {
        list.innerHTML = '<div style="padding:14px;color:var(--text-sub);text-align:center;font-size:0.85rem;">결과가 없습니다 🥲</div>';
    }
}

function acItem(flag, name, code) {
    return `<div class="ac-item" data-name="${escHtml(name)}" data-code="${escHtml(code)}">
        <span style="font-weight:700;">${escHtml(flag)} ${escHtml(name)}</span>
        <span class="ac-code">${escHtml(code)}</span>
    </div>`;
}

function bindAcItems(list) {
    list.querySelectorAll('.ac-item').forEach(el => {
        el.onclick = () => selectStock(el.dataset.name, el.dataset.code);
    });
}

async function selectStock(name, code) {
    document.getElementById('sName').value = name;
    document.getElementById('sCode').value = code;
    document.getElementById('autocompleteList').style.display = 'none';

    const btn = document.getElementById('addBtn');
    btn.textContent = '⏳ 현재가 조회 중...';
    btn.disabled = true;

    try {
        const d = await getPrice(code);
        document.getElementById('sAvg').value = d.price;
        document.getElementById('sQty').focus();
    } catch {
        document.getElementById('sAvg').focus();
        toast('⚠️ 현재가 자동 입력 실패. 직접 입력하세요.');
    }

    btn.textContent = '포트폴리오에 저장';
    btn.disabled = false;
}

async function addStock() {
    const name = document.getElementById('sName').value.trim();
    const code = document.getElementById('sCode').value.trim();
    const avg = parseFloat(document.getElementById('sAvg').value);
    const qty = parseFloat(document.getElementById('sQty').value) || 0;

    if (!code) return toast('⚠️ 종목코드를 입력하세요.');
    if (isNaN(avg) || avg <= 0) return toast('⚠️ 올바른 평단가를 입력하세요.');

    const btn = document.getElementById('addBtn');
    btn.textContent = '⏳ 저장 중...'; btn.disabled = true;

    try {
        const d = await getPrice(code);
        myStocks.push({
            name: name || d.name || code,
            code, avgPrice: avg, quantity: qty,
            currentPrice: d.price, change: d.change, changeRate: d.changeRate
        });
        Store.set('myStocks', myStocks);
        ['sName','sCode','sAvg','sQty'].forEach(id => document.getElementById(id).value = '');
        renderList();
        toast('✅ 종목이 추가되었습니다!');
    } catch {
        toast('❌ 추가 실패. 종목코드를 확인하세요.');
    }

    btn.textContent = '포트폴리오에 저장'; btn.disabled = false;
}

function delStock(idx) {
    deletedStock = { stock: { ...myStocks[idx] }, idx };
    myStocks.splice(idx, 1);
    Store.set('myStocks', myStocks);
    renderList();

    // 삭제 취소 바 표시
    const bar = document.getElementById('undoBar');
    document.getElementById('undoText').textContent = `"${deletedStock.stock.name}" 삭제됨`;
    bar.style.display = 'flex';
    clearTimeout(undoTimer);
    undoTimer = setTimeout(() => { bar.style.display = 'none'; deletedStock = null; }, 5000);
}

function undoDelete() {
    if (!deletedStock) return;
    clearTimeout(undoTimer);
    myStocks.splice(deletedStock.idx, 0, deletedStock.stock);
    Store.set('myStocks', myStocks);
    renderList();
    document.getElementById('undoBar').style.display = 'none';
    deletedStock = null;
    toast('↩️ 되돌렸습니다.');
}

function moveStock(idx, dir) {
    const to = idx + dir;
    if (to < 0 || to >= myStocks.length) return;
    [myStocks[idx], myStocks[to]] = [myStocks[to], myStocks[idx]];
    Store.set('myStocks', myStocks);
    renderList();
}

async function refreshAll() {
    const btn = document.getElementById('refreshBtn');
    btn.textContent = '⏳ 갱신 중';
    btn.disabled = true;
    showErr('');

    try {
        await updateExchangeRate();
    } catch {}

    const results = await Promise.allSettled(
        myStocks.map(async (s, i) => {
            const d = await getPrice(s.code);
            myStocks[i].currentPrice = d.price;
            myStocks[i].change = d.change;
            myStocks[i].changeRate = d.changeRate;
            if (d.name && (!s.name || s.name === s.code)) myStocks[i].name = d.name;
        })
    );

    const failed = results.filter(r => r.status === 'rejected').length;
    if (failed > 0) showErr(`⚠️ ${failed}개 종목 가격 업데이트에 실패했습니다. 시장 시간 외이거나 네트워크를 확인하세요.`);

    const now = new Date();
    const ts = `${now.getHours().toString().padStart(2,'0')}:${now.getMinutes().toString().padStart(2,'0')}:${now.getSeconds().toString().padStart(2,'0')}`;
    Store.set('myStocks', myStocks);
    Store.set('lastUpdate', ts);
    renderList();

    btn.textContent = '🔄 갱신'; btn.disabled = false;
}

function renderList() {
    const container = document.getElementById('stockList');
    const frag = document.createDocumentFragment();
    let totalInvKRW = 0, totalCurKRW = 0;

    const lastTs = Store.get('lastUpdate', '');
    if (lastTs) document.getElementById('lastUpdate').textContent = `갱신: ${lastTs}`;
    document.getElementById('exRateLabel').textContent = `(환율: ${exchangeRate.toFixed(0)}원)`;

    if (myStocks.length === 0) {
        const empty = document.createElement('div');
        empty.className = 'empty-state';
        empty.innerHTML = '<div class="icon">📋</div><div>아직 종목이 없습니다.<br>아래에서 추가해보세요!</div>';
        frag.appendChild(empty);
        container.innerHTML = '';
        container.appendChild(frag);
        updateSummary(0, 0);
        return;
    }

    myStocks.forEach((s, i) => {
        const isKR = /^\d{6}$/.test(s.code) || s.code.endsWith('.KS') || s.code.endsWith('.KQ');
        const curr = isKR ? '원' : '$';
        const inv = s.avgPrice * s.quantity;
        const cur = s.currentPrice * s.quantity;
        totalInvKRW += isKR ? inv : inv * exchangeRate;
        totalCurKRW += isKR ? cur : cur * exchangeRate;

        const yR = s.avgPrice ? (((s.currentPrice - s.avgPrice) / s.avgPrice) * 100) : 0;
        const yStr = yR.toFixed(2);
        const yColor = yR > 0 ? 'var(--red)' : (yR < 0 ? 'var(--blue)' : 'white');

        const chg = s.change || 0;
        const chgR = s.changeRate || 0;
        const chgColor = chg > 0 ? 'var(--red)' : (chg < 0 ? 'var(--blue)' : 'var(--text-sub)');
        const chgSign = chg > 0 ? '▲' : (chg < 0 ? '▼' : '—');
        const chgStr = chg !== 0 ? `${chgSign} ${Math.abs(chg).toLocaleString('en-US')} (${chgR > 0 ? '+' : ''}${chgR.toFixed(2)}%)` : '—';

        const div = document.createElement('div');
        div.className = 'stock-item';
        div.innerHTML = `
            <div style="display:flex;align-items:center;">
                <div class="order-btns">
                    <button class="order-btn" onclick="moveStock(${i},-1)" aria-label="위로">▲</button>
                    <button class="order-btn" onclick="moveStock(${i},1)" aria-label="아래로">▼</button>
                </div>
                <div style="flex:1;cursor:pointer;" onclick="toggleChart(${i})">
                    <div style="display:flex;justify-content:space-between;align-items:flex-start;">
                        <div>
                            <div style="font-weight:800;font-size:1.02rem;">${escHtml(s.name)}</div>
                            <div style="font-size:0.78rem;color:var(--text-sub);margin-top:2px;">
                                평단 ${s.avgPrice.toLocaleString('en-US')}${curr} × ${s.quantity}주
                            </div>
                        </div>
                        <div style="text-align:right;">
                            <div style="font-weight:800;font-size:1.08rem;color:${yColor}">${s.currentPrice.toLocaleString('en-US')}${curr}</div>
                            <div style="font-size:0.78rem;font-weight:700;color:${chgColor};margin-top:2px;">${chgStr}</div>
                        </div>
                    </div>
                    <div style="display:flex;justify-content:flex-end;margin-top:6px;">
                        <span style="font-size:0.82rem;font-weight:700;color:${yColor};background:rgba(255,255,255,.05);padding:3px 10px;border-radius:6px;">
                            수익률 ${yStr}%
                        </span>
                    </div>
                </div>
            </div>

            <div class="chart-area" id="chart-${i}">
                <div class="chart-area-inner">
                    <div class="period-row">
                        <button class="period-btn active" onclick="changePeriod(${i},'${s.code}','day',this);event.stopPropagation();">일봉</button>
                        <button class="period-btn" onclick="changePeriod(${i},'${s.code}','week',this);event.stopPropagation();">주봉</button>
                        <button class="period-btn" onclick="changePeriod(${i},'${s.code}','month',this);event.stopPropagation();">월봉</button>
                    </div>
                    <img id="chart-img-${i}" class="chart-img"
                        src="${chartUrl(s.code,'day')}"
                        loading="lazy"
                        onerror="this.src='https://dummyimage.com/600x300/151b2b/818cf8.png&text=차트+로딩+실패'"
                        alt="${escHtml(s.name)} 차트">
                    <div class="actions">
                        <button class="action-btn" style="background:rgba(16,185,129,.12);color:#34d399;" onclick="openWater(${i})">💧 물타기</button>
                        <button class="action-btn" style="background:rgba(99,102,241,.12);color:#818cf8;" onclick="openEdit(${i})">🔍 진단/수정</button>
                        <button class="action-btn" style="background:rgba(255,255,255,.05);color:var(--text-sub);" onclick="delStock(${i})">삭제</button>
                    </div>
                </div>
            </div>`;
        frag.appendChild(div);
    });

    container.innerHTML = '';
    container.appendChild(frag);
    updateSummary(totalInvKRW, totalCurKRW);
}

function escHtml(str) {
    return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function updateSummary(inv, cur) {
    const pl = cur - inv;
    const plRate = inv > 0 ? ((pl / inv) * 100).toFixed(2) : '0.00';
    const yColor = +plRate > 0 ? 'var(--red)' : (+plRate < 0 ? 'var(--blue)' : 'white');

    const yEl = document.getElementById('totalYield');
    yEl.textContent = (+plRate > 0 ? '+' : '') + plRate + '%';
    yEl.style.color = yColor;

    document.getElementById('totalInv').textContent = Math.floor(inv).toLocaleString() + '원';
    const plEl = document.getElementById('totalPL');
    plEl.textContent = (pl >= 0 ? '+' : '') + Math.floor(pl).toLocaleString() + '원';
    plEl.style.color = pl > 0 ? 'var(--red)' : (pl < 0 ? 'var(--blue)' : 'white');
}

// ═══════════════════════════════════════════
//  차트
// ═══════════════════════════════════════════

function chartUrl(code, period = 'day') {
    const ts = Date.now();
    const isKR = /^\d{6}$/.test(code);
    let ticker = code.includes('@') ? code.split('@').pop() : code;
    ticker = ticker.toUpperCase();

    if (isKR) {
        return `https://ssl.pstatic.net/imgfinance/chart/item/candle/${period}/${ticker}.png?${ts}`;
    } else {
        const p = period === 'week' ? 'w' : (period === 'month' ? 'm' : 'd');
        return `https://finviz.com/chart.ashx?t=${ticker}&ty=c&ta=0&p=${p}&_=${ts}`;
    }
}

function toggleChart(i) {
    document.getElementById(`chart-${i}`).classList.toggle('open');
}

function changePeriod(i, code, period, btn) {
    document.getElementById(`chart-img-${i}`).src = chartUrl(code, period);
    document.getElementById(`chart-${i}`).querySelectorAll('.period-btn')
        .forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
}

// ═══════════════════════════════════════════
//  모달
// ═══════════════════════════════════════════

function closeModals() {
    document.querySelectorAll('.modal').forEach(m => m.style.display = 'none');
    document.getElementById('overlay').style.display = 'none';
}

function openEdit(i) {
    curIdx = i;
    const s = myStocks[i];
    document.getElementById('aModalTitle').textContent = s.name;
    document.getElementById('aModalSub').textContent = `코드: ${s.code} · 수익률: ${s.avgPrice ? (((s.currentPrice - s.avgPrice) / s.avgPrice) * 100).toFixed(2) : '0'}%`;
    document.getElementById('uCode').value = s.code;
    document.getElementById('uAvg').value = s.avgPrice;
    document.getElementById('uQty').value = s.quantity;
    document.getElementById('uPrice').value = s.currentPrice;
    document.getElementById('overlay').style.display = 'block';
    document.getElementById('aModal').style.display = 'block';
}

function saveEdit() {
    const s = myStocks[curIdx];
    s.code = document.getElementById('uCode').value.trim() || s.code;
    s.avgPrice = parseFloat(document.getElementById('uAvg').value) || s.avgPrice;
    s.quantity = parseFloat(document.getElementById('uQty').value) || s.quantity;
    s.currentPrice = parseFloat(document.getElementById('uPrice').value) || s.currentPrice;
    Store.set('myStocks', myStocks);
    renderList();
    closeModals();
    toast('✅ 저장되었습니다.');
}

function openGemini() {
    const s = myStocks[curIdx];
    const txt = `전문 애널리스트로서 [${s.name}] 주식 분석 리포트를 써줘.\n평단가: ${s.avgPrice}, 현재가: ${s.currentPrice}\n수익률에 맞는 대응 전략을 제시해줘.`;
    // 클립보드 API 실패 시 fallback 처리
    const doOpen = () => window.open('https://gemini.google.com/', '_blank');
    if (navigator.clipboard && navigator.clipboard.writeText) {
        navigator.clipboard.writeText(txt)
            .then(() => { toast('📋 분석 질문 복사 완료! Gemini에서 붙여넣기 하세요.'); doOpen(); })
            .catch(() => { doOpen(); });
    } else {
        doOpen();
    }
}

function openWater(i) {
    curIdx = i;
    document.getElementById('waterName').textContent = myStocks[i].name;
    document.getElementById('addMoney').value = '';
    document.getElementById('waterResult').style.display = 'none';
    document.getElementById('overlay').style.display = 'block';
    document.getElementById('waterModal').style.display = 'block';
}

function calcWater() {
    const moneyVal = document.getElementById('addMoney').value;
    const money = parseFloat(moneyVal);
    const s = myStocks[curIdx];
    if (!moneyVal || isNaN(money) || money <= 0 || !s || !s.currentPrice) {
        document.getElementById('waterResult').style.display = 'none';
        return;
    }

    const addQty = Math.floor(money / s.currentPrice);
    if (addQty <= 0) {
        document.getElementById('wBuyQty').textContent = '금액이 현재가보다 작습니다.';
        document.getElementById('wNewAvg').textContent = '—';
        document.getElementById('waterResult').style.display = 'block';
        return;
    }
    const newTotal = s.avgPrice * s.quantity + s.currentPrice * addQty;
    const newQty = s.quantity + addQty;
    const newAvg = newTotal / newQty;

    const isKR = /^\d{6}$/.test(s.code);
    const currSymbol = isKR ? '원' : '$';

    document.getElementById('wNewAvg').textContent = newAvg.toLocaleString('en-US', { maximumFractionDigits: 2 }) + currSymbol;
    document.getElementById('wBuyQty').textContent = `${addQty}주 매수 · 총 ${newQty}주 보유 예정`;
    document.getElementById('waterResult').style.display = 'block';
}

// ═══════════════════════════════════════════
//  초기화
// ═══════════════════════════════════════════

// 자동완성 외부 클릭 닫기
document.addEventListener('click', e => {
    if (!e.target.closest('.search-wrap'))
        document.getElementById('autocompleteList').style.display = 'none';
});

window.addEventListener('load', () => {
    renderList();
    // 가격 조용히 갱신 (UI 블로킹 없이)
    refreshAll();
});
</script>
