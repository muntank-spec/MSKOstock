        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }

        .container { max-width: 600px; margin: 0 auto; }
        .header { text-align: center; margin: 20px 0; }
        .header h1 { font-size: 1.6rem; font-weight: 800; background: linear-gradient(to right, #a5b4fc, #818cf8); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 5px; }

        .search-area { position: relative; margin-bottom: 12px; }
        input { width: 100%; background: #1e2536; border: 1px solid var(--border); color: white; padding: 16px; border-radius: 12px; font-size: 1rem; outline: none; }
        input:focus { border-color: var(--primary); }
        .input-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 12px; }

        #autocompleteList { 
            position: absolute; top: 100%; left: 0; right: 0; background: #1e293b; 
            border: 2px solid var(--primary); border-radius: 12px; z-index: 10000; 
            max-height: 300px; overflow-y: auto; display: none; margin-top: 8px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.8);
        }
        .autocomplete-item { padding: 15px; cursor: pointer; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
        .autocomplete-item:active { background: var(--primary); }
        .stock-code-tag { color: var(--text-sub); font-size: 0.8rem; font-weight: bold; background: rgba(255,255,255,0.05); padding: 2px 6px; border-radius: 4px; }
        
        .btn-main { width: 100%; padding: 16px; background: var(--primary); border: none; color: white; border-radius: 12px; font-weight: 800; font-size: 1rem; cursor: pointer; }
        .btn-sub { padding: 8px 16px; background: rgba(255,255,255,0.05); border: 1px solid var(--border); color: var(--text-main); border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 0.85rem; }

        .stock-item { background: rgba(255,255,255,0.02); border-radius: 18px; padding: 18px; margin-bottom: 12px; border: 1px solid var(--border); }
        
        .order-btns { display: flex; flex-direction: column; gap: 4px; margin-right: 12px; }
        .order-btn { background: #1e2536; border: none; color: var(--text-sub); width: 24px; height: 24px; border-radius: 4px; font-size: 10px; cursor: pointer; }

        .chart-dropdown { display: none; margin-top: 15px; text-align: center; }
        .chart-dropdown.active { display: block; }
        .chart-img { width: 100%; border-radius: 10px; filter: invert(93%) hue-rotate(180deg) brightness(1.05) contrast(1.1); }
        
        .period-selector { display: flex; justify-content: center; gap: 8px; margin-bottom: 12px; }
        .period-btn { background: rgba(255,255,255,0.05); border: 1px solid var(--border); color: var(--text-sub); padding: 6px 16px; border-radius: 20px; font-size: 0.85rem; cursor: pointer; font-weight: 600; }
        .period-btn.active { background: var(--primary); color: white; }

        .action-btn { flex: 1; padding: 8px 0; border-radius: 8px; font-weight: 700; font-size: 0.8rem; cursor: pointer; border: none; text-align: center; }

    const fetchWithFallback = async (url) => {
        const proxies = [
            `https://api.allorigins.win/get?url=${encodeURIComponent(url)}&_=${Date.now()}`,
            `https://api.codetabs.com/v1/proxy/?quest=${url}`
        ];
        for (let proxy of proxies) {
            try {
                const controller = new AbortController();
                const timeoutId = setTimeout(() => controller.abort(), 2000); 
                const res = await fetch(proxy, { signal: controller.signal, cache: 'no-store' });
                clearTimeout(timeoutId);
                if (res.ok) {
                    const json = await res.json();
                    return proxy.includes('allorigins') ? JSON.parse(json.contents) : json;
                }
            } catch(e) { console.log("서버 지연, 우회 중..."); }
        }
        throw new Error("모든 서버 응답 없음"); 
    };

        window[cbName] = (data) => { resolve(data.items[0]); delete window[cbName]; };
        const script = document.createElement('script');
        script.src = `https://ac.finance.naver.com/ac?q=${encodeURIComponent(query)}&st=111&frm=stock&r_format=json&r_unicode=1&t_koreng=1&ans=2&_callback=${cbName}`;
        script.onerror = () => resolve([]);
        document.head.appendChild(script);
        setTimeout(() => resolve([]), 1500);
    });

    window.onload = () => { renderList(); updateAllPricesOnLoad(); };

    async function searchNetworkStock(query) {
        clearTimeout(searchTimer);
        const list = document.getElementById('autocompleteList');
        if (!query || query.trim().length < 1) { list.style.display = 'none'; return; }

        list.innerHTML = '<div style="padding: 15px; color: var(--text-sub); text-align: center;">⚡ 통합 마켓 검색 중... 🔍</div>';
        list.style.display = 'block';

        searchTimer = setTimeout(async () => {
            let html = '';
            const addedCodes = new Set(); 
            const smartQuery = autoCorrectQuery(query); 

            // ⭐ 1단계: 초고속 로컬 DB 검색 (타자마자 즉시 반응)
            const localResults = TOP_STOCKS.filter(s => s.n.toLowerCase().includes(smartQuery.toLowerCase()) || s.c.toLowerCase().includes(smartQuery.toLowerCase()));
            localResults.forEach(s => {
                html += `<div class="autocomplete-item" onclick="selectStock('${s.n}', '${s.c}')">
                    <span style="color:white; font-weight:700;">${s.nat} ${s.n}</span>
                    <span class="stock-code-tag">${s.c}</span>
                </div>`;
                addedCodes.add(s.c);
            });
            
            if (html) list.innerHTML = html; // 캐싱된 결과 우선 표출

            // ⭐ 2단계: 네이버 국내 주식 라이브 검색
            try {
                const naverItems = await fetchNaverDomestic(smartQuery);
                if (naverItems && naverItems.length > 0) {
                    naverItems.forEach(item => {
                        const name = Array.isArray(item[0]) ? item[0][0] : item[0];
                        const code = Array.isArray(item[1]) ? item[1][0] : item[1];
                        if (!addedCodes.has(code)) {
                            html += `<div class="autocomplete-item" onclick="selectStock('${name}', '${code}')">
                                <span style="color:white; font-weight:700;">🇰🇷 ${name}</span>
                                <span class="stock-code-tag">${code}</span>
                            </div>`;
                            addedCodes.add(code);
                        }
                    });
                    if (html) list.innerHTML = html;
                }
            } catch(e) {}

            // ⭐ 3단계: 야후 해외 주식 라이브 검색
            try {
                const yahooUrl = `https://query2.finance.yahoo.com/v1/finance/search?q=${encodeURIComponent(smartQuery)}&quotesCount=4`;
                const data = await fetchWithFallback(yahooUrl);
                if (data && data.quotes && data.quotes.length > 0) {
                    data.quotes.forEach(q => {
                        if ((q.quoteType === 'EQUITY' || q.quoteType === 'ETF') && !q.symbol.includes('.KS') && !q.symbol.includes('.KQ') && !addedCodes.has(q.symbol)) {
                            const name = q.shortname || q.longname || q.symbol;
                            html += `<div class="autocomplete-item" onclick="selectStock('${name.replace(/'/g, "\\'")}', '${q.symbol}')">
                                <span style="color:white; font-weight:700;">🇺🇸 ${name}</span>
                                <span class="stock-code-tag">${q.symbol}</span>
                            </div>`;
                            addedCodes.add(q.symbol);
                        }
                    });
                }
            } catch(e) {}

            if (html) {
                list.innerHTML = html;
            } else {
                list.innerHTML = '<div style="padding: 15px; color: var(--text-sub); text-align: center; line-height: 1.5;">결과가 없습니다 🥲</div>';
            }
        }, 300);
    }

    async function selectStock(name, code) { 
        document.getElementById('sName').value = name; 
        document.getElementById('sCode').value = code; 
        document.getElementById('autocompleteList').style.display = 'none'; 
        
        const statusBtn = document.getElementById('addBtn');
        statusBtn.innerText = "⏳ 시가 조회 중...";
        
        try {
            const data = await getRealTimeData(code);
            document.getElementById('sAvg').value = data.price;
            document.getElementById('sAvg').focus();
        } catch(e) { 
            console.error("가격 조회 실패");
            alert("⚠️ 현재 해당 종목의 실시간 가격을 불러오기 어렵습니다. 평단가를 직접 입력해 주세요.");
            document.getElementById('sAvg').focus();
        }
        
        statusBtn.innerText = "포트폴리오에 저장";
    }

    async function updateExchangeRate() {
        try {
            const data = await fetchWithFallback('https://query1.finance.yahoo.com/v8/finance/chart/KRW=X?interval=1d&range=1d');
            currentExchangeRate = data.chart.result[0].meta.regularMarketPrice;
        } catch(e) { console.log("환율 업데이트 실패"); }
    }

    async function getRealTimeData(code, isRetry = false) {
        const isKoreaTicker = /^\d{6}$/.test(code);
        const ticker = code.includes('@') ? code.split('@').pop() : code;

        try {
            if (isKoreaTicker && code.length === 6) {
                const data = await fetchWithFallback('https://m.stock.naver.com/api/stock/'+ticker+'/basic');
                const price = parseInt(data.closePrice.replace(/,/g, ''));
                
                let sign = 1;
                if(data.compareToPreviousPrice && data.compareToPreviousPrice.code === '5') sign = -1;
                
                const parsedChange = data.compareToPreviousClosePrice ? parseInt(data.compareToPreviousClosePrice.replace(/,/g, '')) : 0;
                const change = Math.abs(parsedChange) * sign;
                
                const parsedRate = data.fluctuationsRatio ? parseFloat(data.fluctuationsRatio.replace(/,/g, '')) : 0;
                const changeRate = Math.abs(parsedRate) * sign;

                return { price, name: data.stockName, change, changeRate };
            } else {
                // BRK-B 같은 티커를 BRK.B로 변환 (야후 파이낸스 규격 맞춤)
                const safeTicker = ticker.replace('-', '.'); 
                const data = await fetchWithFallback('https://query1.finance.yahoo.com/v8/finance/chart/'+safeTicker+'?interval=1d&range=2d');
                const meta = data.chart.result[0].meta;
                const price = parseFloat(meta.regularMarketPrice.toFixed(2));
                const prevClose = parseFloat(meta.chartPreviousClose.toFixed(2));
                const change = parseFloat((price - prevClose).toFixed(2));
                const changeRate = parseFloat(((change / prevClose) * 100).toFixed(2));
                return { price, name: ticker, change, changeRate };
            }
        } catch (e) {
            if (!isRetry && !code.includes('@') && !isKoreaTicker) return getRealTimeData("NAS@" + code, true);
            throw e;
        }
    }

    async function updateAllPricesOnLoad() {
        const btn = document.getElementById('refreshBtn');
        if (btn) btn.innerText = "⏳ 갱신중";
        
        try {
            await updateExchangeRate();
            const promises = myStocks.map(async (s) => {
                try {
                    const d = await getRealTimeData(s.code); 
                    s.currentPrice = d.price;
                    s.change = d.change;
                    s.changeRate = d.changeRate;
                    if (d.name && (!s.name || s.name === s.code)) s.name = d.name;
                } catch(e) { console.error(`${s.code} 실패:`, e); }
            });
            await Promise.all(promises);
            
            const now = new Date();
            const timeStr = `${now.getHours().toString().padStart(2, '0')}:${now.getMinutes().toString().padStart(2, '0')}:${now.getSeconds().toString().padStart(2, '0')}`;
            localStorage.setItem('lastUpdateTime', timeStr);
            localStorage.setItem('myStocks', JSON.stringify(myStocks));
            renderList();
        } finally {
            if (btn) btn.innerText = "🔄 갱신";
        }
    }

    function getChartUrl(code, period = 'day') {
        const ts = Date.now();
        const isKorea = /^\d{6}$/.test(code) || code.endsWith('.KS') || code.endsWith('.KQ');
        let ticker = code;
        if (code.includes('@')) ticker = code.split('@').pop();
        ticker = ticker.toUpperCase();

        if (isKorea) {
            const cleanTicker = ticker.replace('.KS', '').replace('.KQ', '');
            return `https://ssl.pstatic.net/imgfinance/chart/item/candle/${period}/${cleanTicker}.png?${ts}`;
        } else {
            let p = period === 'week' ? 'w' : (period === 'month' ? 'm' : 'd');
            return `https://finviz.com/chart.ashx?t=${ticker}&ty=c&ta=0&p=${p}&_=${ts}`;
        }
    }

    function toggleChart(idx) { document.getElementById(`chart-${idx}`).classList.toggle('active'); }
    function changePeriod(idx, code, period, btnEl) {
        document.getElementById(`chart-img-${idx}`).src = getChartUrl(code, period);
        document.getElementById(`chart-${idx}`).querySelectorAll('.period-btn').forEach(b => b.classList.remove('active'));
        btnEl.classList.add('active');
    }

    function moveStock(idx, direction) {
        if (idx + direction < 0 || idx + direction >= myStocks.length) return;
        const target = myStocks.splice(idx, 1)[0];
        myStocks.splice(idx + direction, 0, target);
        localStorage.setItem('myStocks', JSON.stringify(myStocks));
        renderList();
    }

    function renderList() {
        const container = document.getElementById('stockListContainer');
        container.innerHTML = '';
        let totalInvKRW = 0, totalCurKRW = 0;

        const lastTime = localStorage.getItem('lastUpdateTime');
        if (lastTime) document.getElementById('lastUpdateDisplay').innerText = `최근 갱신: ${lastTime}`;

        myStocks.forEach((s, i) => {
            const isKorea = /^\d{6}$/.test(s.code) || s.code.endsWith('.KS') || s.code.endsWith('.KQ');
            const curr = isKorea ? '원' : '$';
            
            const inv = s.avgPrice * s.quantity;
            const cur = s.currentPrice * s.quantity;
            totalInvKRW += isKorea ? inv : inv * currentExchangeRate;
            totalCurKRW += isKorea ? cur : cur * currentExchangeRate;

            const yieldRate = (((s.currentPrice - s.avgPrice) / s.avgPrice) * 100).toFixed(2);
            const color = yieldRate > 0 ? 'var(--red)' : (yieldRate < 0 ? 'var(--blue)' : 'white');
            
            const cVal = s.change || 0;
            const cRate = s.changeRate || 0;
            const dodColor = cVal > 0 ? 'var(--red)' : (cVal < 0 ? 'var(--blue)' : 'var(--text-sub)');
            const dodSign = cVal > 0 ? '▲' : (cVal < 0 ? '▼' : '-');
            
            const cValStr = cVal > 0 ? `+${cVal.toLocaleString('en-US')}` : cVal.toLocaleString('en-US');
            const cRateStr = cRate > 0 ? `+${cRate.toFixed(2)}` : cRate.toFixed(2);
            
            const dodHtml = `<div style="font-size:0.8rem; font-weight:700; color:${dodColor}; margin-top:3px;">${dodSign} ${cValStr} (${cRateStr}%)</div>`;

            container.innerHTML += `
                <div class="stock-item">
                    <div style="display:flex; align-items:center;">
                        <div class="order-btns">
                            <button class="order-btn" onclick="moveStock(${i}, -1)">▲</button>
                            <button class="order-btn" onclick="moveStock(${i}, 1)">▼</button>
                        </div>
                        <div style="flex:1; cursor:pointer;" onclick="toggleChart(${i})">
                            <div style="display:flex; justify-content:space-between; align-items:center;">
                                <div>
                                    <div style="font-weight:800; font-size:1.05rem; color:white;">${s.name}</div>
                                    <div style="font-size:0.8rem; color:var(--text-sub);">평단 ${s.avgPrice.toLocaleString('en-US')}${curr} (x${s.quantity})</div>
                                </div>
                                <div style="text-align:right;">
                                    <div style="font-weight:800; font-size:1.1rem; color:${color}">${s.currentPrice.toLocaleString('en-US')}${curr}</div>
                                    ${dodHtml}
                                </div>
                            </div>
                            <div style="text-align:right; margin-top:5px; font-size:0.85rem; font-weight:700; color:${color}; background:rgba(255,255,255,0.05); padding:4px 8px; border-radius:6px; display:inline-block; float:right;">수익률 ${isNaN(yieldRate) ? '0.00' : yieldRate}%</div>
                            <div style="clear:both;"></div>
                        </div>
                    </div>
                    <div class="chart-dropdown" id="chart-${i}">
                        <div class="period-selector" style="margin-top:10px;">
                            <button class="period-btn active" onclick="changePeriod(${i}, '${s.code}', 'day', this); event.stopPropagation();">일봉</button>
                            <button class="period-btn" onclick="changePeriod(${i}, '${s.code}', 'week', this); event.stopPropagation();">주봉</button>
                            <button class="period-btn" onclick="changePeriod(${i}, '${s.code}', 'month', this); event.stopPropagation();">월봉</button>
                        </div>
                        <img src="${getChartUrl(s.code, 'day')}" class="chart-img" id="chart-img-${i}" onerror="this.src='https://dummyimage.com/600x400/151b2b/818cf8.png&text=Chart+Loading...'">
                        <div class="actions">
                            <button class="action-btn" style="background:rgba(16, 185, 129, 0.15); color:#34d399;" onclick="openWater(${i})">💧 물타기</button>
                            <button class="action-btn" style="background:rgba(99, 102, 241, 0.15); color:#818cf8;" onclick="openA(${i})">🔍 진단</button>
                            <button class="action-btn" style="background:rgba(255, 255, 255, 0.05); color:var(--text-sub);" onclick="delStock(${i})">삭제</button>
                        </div>
                    </div>
                </div>`;
        });

        const totalPr = totalInvKRW > 0 ? (((totalCurKRW - totalInvKRW) / totalInvKRW) * 100).toFixed(2) : '0.00';
        const yieldEl = document.getElementById('totalYieldDisplay');
        yieldEl.innerText = (totalPr > 0 ? '+' : '') + totalPr + '%';
        yieldEl.style.color = totalPr > 0 ? 'var(--red)' : (totalPr < 0 ? 'var(--blue)' : 'white');
        document.getElementById('totalInvDisplay').innerText = Math.floor(totalInvKRW).toLocaleString() + "원";
        document.getElementById('totalPlDisplay').innerText = Math.floor(totalCurKRW - totalInvKRW).toLocaleString() + "원";
        document.getElementById('totalPlDisplay').style.color = (totalCurKRW - totalInvKRW) > 0 ? 'var(--red)' : (totalCurKRW - totalInvKRW < 0 ? 'var(--blue)' : 'white');
        document.getElementById('exRateDisplay').innerText = `(환율: ${currentExchangeRate.toFixed(1)})`;
    }

    async function addStock() {
        const name = document.getElementById('sName').value;
        const code = document.getElementById('sCode').value;
        const avg = parseFloat(document.getElementById('sAvg').value);
        const qty = parseFloat(document.getElementById('sQty').value) || 0;
        if (!code || isNaN(avg)) return alert("종목코드와 평단가를 입력하세요!");
        
        try {
            const data = await getRealTimeData(code);
            myStocks.push({ name: name || data.name, code, avgPrice: avg, quantity: qty, currentPrice: data.price, change: data.change, changeRate: data.changeRate });
            localStorage.setItem('myStocks', JSON.stringify(myStocks));
            document.getElementById('sName').value = '';
            document.getElementById('sCode').value = '';
            document.getElementById('sAvg').value = '';
            document.getElementById('sQty').value = '';
            renderList();
        } catch(e) { alert("종목 추가 실패! 코드를 확인하세요."); }
    }

    function delStock(idx) { if(confirm("삭제하시겠습니까?")) { myStocks.splice(idx, 1); localStorage.setItem('myStocks', JSON.stringify(myStocks)); renderList(); } }
    function closeModals() { document.querySelectorAll('.modal, .modal-overlay').forEach(m => m.style.display = 'none'); }
    function openA(i) {
        curIdx = i; const s = myStocks[i];
        document.getElementById('aTitle').innerText = s.name;
        document.getElementById('uCode').value = s.code;
        document.getElementById('uAvg').value = s.avgPrice;
        document.getElementById('uQty').value = s.quantity;
        document.getElementById('uPrice').value = s.currentPrice;
        document.getElementById('overlay').style.display = 'block'; document.getElementById('aModal').style.display = 'block';
    }
    function updatePrice() {
        myStocks[curIdx].code = document.getElementById('uCode').value;
        myStocks[curIdx].avgPrice = parseFloat(document.getElementById('uAvg').value);
        myStocks[curIdx].quantity = parseFloat(document.getElementById('uQty').value);
        myStocks[curIdx].currentPrice = parseFloat(document.getElementById('uPrice').value);
        localStorage.setItem('myStocks', JSON.stringify(myStocks)); renderList(); closeModals();
    }
    
    function askGemini() {
        const s = myStocks[curIdx];
        const txt = `전문 애널리스트로서 [${s.name}] 주식 분석 리포트를 써줘.\n평단가: ${s.avgPrice}, 현재가: ${s.currentPrice}\n수익률상황에 맞는 대응전략 제시 요망.`;
        navigator.clipboard.writeText(txt).then(() => { 
            alert("✨ AI 분석 질문 복사완료!\n제미나이 화면이 열리면 '붙여넣기' 하세요.");
            window.location.href = 'https://gemini.google.com/';
        });
    }

    function checkAppUpdate() {
        alert("🚀 현재 최신 버전(v6.0.0)을 사용 중입니다.\n\n약 150여 개의 글로벌 탑 주식/ETF가 탑재되어 오프라인에서도 빛의 속도로 검색됩니다!");
    }

    function openWater(i) { curIdx = i; document.getElementById('wDesc').innerText = myStocks[i].name; document.getElementById('overlay').style.display = 'block'; document.getElementById('waterModal').style.display = 'block'; }
    function calcWater() {
        const money = parseFloat(document.getElementById('addMoney').value); const s = myStocks[curIdx];
        if(!money) return;
        const addQty = Math.floor(money / s.currentPrice);
        const newAvg = (s.avgPrice * s.quantity + addQty * s.currentPrice) / (s.quantity + addQty);
        document.getElementById('wNewAvg').innerText = newAvg.toLocaleString('en-US', {maximumFractionDigits: 2});
        document.getElementById('wBuyQty').innerText = addQty + "주 매수 가능";
        document.getElementById('wResult').style.display = 'block';
    }
    async function refreshAllPrices() {
        await updateAllPricesOnLoad();
    }
</script>
