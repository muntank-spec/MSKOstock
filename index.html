<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>문성님의 스마트 주식 비서</title>

    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="주식비서 Pro">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#0b0f19">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/2933/2933116.png">

    <style>
        /* 🎨 초고급 다크 UI */
        @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
        :root { 
            --bg-color: #0b0f19; --card-bg: #151b2b; --primary: #4f46e5; --border: #262f45; 
            --text-main: #f8fafc; --text-sub: #94a3b8; --red: #f43f5e; --blue: #3b82f6;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
        body { font-family: 'Pretendard', sans-serif; background: var(--bg-color); color: var(--text-main); padding: 15px; }
        .container { max-width: 600px; margin: 0 auto; }
        .header { text-align: center; margin: 20px 0; }
        .header h1 { font-size: 1.6rem; font-weight: 800; background: linear-gradient(to right, #a5b4fc, #818cf8); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

        /* 🔍 검색창 디자인 */
        .search-area { position: relative; margin-bottom: 12px; }
        input { width: 100%; background: #1e2536; border: 1px solid var(--border); color: white; padding: 16px; border-radius: 14px; font-size: 1rem; outline: none; }
        input:focus { border-color: var(--primary); }
        
        /* 💡 검색 결과 리스트 강제 표시 설정 */
        #autocompleteList { 
            position: absolute; top: 100%; left: 0; right: 0; background: #1e293b; 
            border: 2px solid var(--primary); border-radius: 12px; z-index: 10000; 
            max-height: 250px; overflow-y: auto; display: none; margin-top: 8px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.8);
        }
        .autocomplete-item { padding: 15px; cursor: pointer; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; }
        .autocomplete-item:active { background: var(--primary); }
        .stock-code { color: var(--text-sub); font-size: 0.8rem; font-weight: bold; }

        .card { background: var(--card-bg); padding: 22px; border-radius: 24px; margin-bottom: 20px; border: 1px solid var(--border); }
        .btn-main { width: 100%; padding: 16px; background: var(--primary); border: none; color: white; border-radius: 14px; font-weight: 800; font-size: 1rem; cursor: pointer; }

        .stock-item { background: rgba(255,255,255,0.02); border-radius: 18px; padding: 18px; margin-bottom: 12px; border: 1px solid var(--border); }
        .chart-dropdown { display: none; margin-top: 15px; text-align: center; }
        .chart-dropdown.active { display: block; }
        .chart-img { width: 100%; border-radius: 10px; filter: invert(93%) hue-rotate(180deg) brightness(1.05) contrast(1.1); }
    </style>
</head>
<body>

<div class="container">
    <div class="header"><h1>나의 주식 비서 Pro</h1></div>

    <div class="card">
        <div style="font-weight: 800; margin-bottom: 15px;">🔍 종목 검색 후 추가</div>
        <div class="search-area">
            <input type="text" id="sSearch" placeholder="종목명 입력 (예: 삼성, samg)" oninput="debouncedSearch(this.value)" autocomplete="off">
            <div id="autocompleteList"></div>
        </div>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px;">
            <input type="number" id="sAvg" placeholder="내 평단가">
            <input type="number" id="sQty" placeholder="보유 수량">
        </div>
        <input type="hidden" id="selectedCode">
        <input type="hidden" id="selectedName">
        <button class="btn-main" onclick="addStock()" id="addBtn">내 포트폴리오에 저장</button>
    </div>

    <div id="stockListContainer"></div>
</div>

<script>
    let myStocks = JSON.parse(localStorage.getItem('myStocks')) || [];
    let timer = null;

    window.onload = renderList;

    // 🚀 검색 디바운싱 (타이핑 멈추면 0.3초 뒤 검색)
    function debouncedSearch(val) {
        clearTimeout(timer);
        timer = setTimeout(() => searchStock(val), 300);
    }

    async function searchStock(query) {
        const list = document.getElementById('autocompleteList');
        if (!query || query.length < 1) { list.style.display = 'none'; return; }

        // 네이버 검색 API 호출
        const url = `https://ac.finance.naver.com/ac?q=${encodeURIComponent(query)}&q_enc=utf-8&st=111&r_format=json&t_koreng=1&run=1&rev=0`;
        const proxyUrl = `https://api.allorigins.win/get?url=${encodeURIComponent(url)}`;

        try {
            const res = await fetch(proxyUrl);
            const raw = await res.json();
            const data = JSON.parse(raw.contents);
            const items = data.items[0];

            if (items && items.length > 0) {
                list.innerHTML = items.map(item => `
                    <div class="autocomplete-item" onclick="selectStock('${item[0][0]}', '${item[1][0]}')">
                        <span style="font-weight:700;">${item[0][0]}</span>
                        <span class="stock-code">${item[1][0]}</span>
                    </div>
                `).join('');
                list.style.display = 'block';
            } else {
                list.style.display = 'none';
            }
        } catch (e) {
            console.log("통신 에러");
        }
    }

    function selectStock(name, code) {
        document.getElementById('sSearch').value = name;
        document.getElementById('selectedCode').value = code;
        document.getElementById('selectedName').value = name;
        document.getElementById('autocompleteList').style.display = 'none';
    }

    async function addStock() {
        const code = document.getElementById('selectedCode').value;
        const name = document.getElementById('selectedName').value;
        const avg = parseFloat(document.getElementById('sAvg').value);
        const qty = parseInt(document.getElementById('sQty').value) || 1;

        if(!code || isNaN(avg)) return alert("검색 리스트에서 종목을 터치해 선택하세요!");

        const btn = document.getElementById('addBtn');
        btn.innerText = "조회 중...";

        try {
            const res = await fetch(`https://api.allorigins.win/get?url=${encodeURIComponent('https://m.stock.naver.com/api/stock/'+code+'/basic')}`);
            const raw = await res.json();
            const data = JSON.parse(raw.contents);
            const price = parseInt(data.closePrice.replace(/,/g, ''));

            myStocks.push({ name, code, avgPrice: avg, quantity: qty, currentPrice: price });
            localStorage.setItem('myStocks', JSON.stringify(myStocks));
            renderList();
            
            document.getElementById('sSearch').value = '';
            document.getElementById('sAvg').value = '';
            document.getElementById('sQty').value = '';
            document.getElementById('selectedCode').value = '';
        } catch (e) { alert("데이터 수집 실패"); }
        btn.innerText = "내 포트폴리오에 저장";
    }

    function renderList() {
        const container = document.getElementById('stockListContainer');
        container.innerHTML = '';
        if(myStocks.length === 0) { container.innerHTML = '<div style="text-align:center; padding:40px; color:var(--text-sub);">등록된 종목이 없습니다.</div>'; return; }
        
        myStocks.forEach((s, i) => {
            const pr = (((s.currentPrice - s.avgPrice) / s.avgPrice) * 100).toFixed(2);
            container.innerHTML += `
                <div class="stock-item">
                    <div style="display:flex; justify-content:space-between; align-items:center; cursor:pointer;" onclick="toggleChart(${i})">
                        <div>
                            <div style="font-weight:800; font-size:1.1rem;">${s.name}</div>
                            <div style="font-size:0.85rem; color:var(--text-sub);">평단 ${s.avgPrice.toLocaleString()}원</div>
                        </div>
                        <div style="text-align:right;">
                            <div style="font-weight:800; color:${pr>0?'var(--red)':'var(--blue)'}">${s.currentPrice.toLocaleString()}원</div>
                            <div style="font-size:0.9rem; font-weight:700; color:${pr>0?'var(--red)':'var(--blue)'}">${pr}%</div>
                        </div>
                    </div>
                    <div class="chart-dropdown" id="chart-${i}">
                        <img src="https://ssl.pstatic.net/imgfinance/chart/item/candle/day/${s.code}.png?${Date.now()}" class="chart-img">
                        <button onclick="delStock(${i})" style="width:100%; padding:12px; margin-top:15px; background:rgba(255,255,255,0.05); border:none; color:var(--text-sub); border-radius:10px;">삭제</button>
                    </div>
                </div>`;
        });
    }

    function toggleChart(idx) { document.getElementById(`chart-${idx}`).classList.toggle('active'); }
    function delStock(idx) { if(confirm("삭제하시겠습니까?")) { myStocks.splice(idx, 1); localStorage.setItem('myStocks', JSON.stringify(myStocks)); renderList(); } }
</script>
</body>
</html>
