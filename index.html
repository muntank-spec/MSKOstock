            --bg-color: #0b0f19; --card-bg: #151b2b; --primary: #4f46e5; --border: #262f45; 
            --text-main: #f8fafc; --text-sub: #94a3b8; --red: #f43f5e; --blue: #3b82f6; --green: #10b981;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
        body { font-family: 'Pretendard', sans-serif; background: var(--bg-color); color: var(--text-main); padding: 15px; }
        .container { max-width: 600px; margin: 0 auto; }
        .header { text-align: center; margin: 20px 0; }
        .header h1 { font-size: 1.6rem; font-weight: 800; background: linear-gradient(to right, #a5b4fc, #818cf8); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 5px; }

        .card { background: var(--card-bg); padding: 22px; border-radius: 24px; margin-bottom: 20px; border: 1px solid var(--border); box-shadow: 0 8px 20px rgba(0,0,0,0.2); }
        .search-area { position: relative; margin-bottom: 12px; }
        input { width: 100%; background: #1e2536; border: 1px solid var(--border); color: white; padding: 16px; border-radius: 12px; font-size: 1rem; outline: none; }
        input:focus { border-color: var(--primary); }
        .input-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 12px; }

        #autocompleteList { 
            position: absolute; top: 100%; left: 0; right: 0; background: #1e293b; 
            border: 2px solid var(--primary); border-radius: 12px; z-index: 10000; 
            max-height: 250px; overflow-y: auto; display: none; margin-top: 8px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.8);
        }
        .autocomplete-item { padding: 15px; cursor: pointer; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; }
        .autocomplete-item:active { background: var(--primary); }
        .stock-code-tag { color: var(--text-sub); font-size: 0.8rem; font-weight: bold; }
        .search-status { padding: 15px; text-align: center; font-size: 0.85rem; color: var(--text-sub); }

        .btn-main { width: 100%; padding: 16px; background: var(--primary); border: none; color: white; border-radius: 12px; font-weight: 800; font-size: 1rem; cursor: pointer; }
        .btn-sub { padding: 8px 16px; background: rgba(255,255,255,0.05); border: 1px solid var(--border); color: var(--text-main); border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 0.85rem; }

        .stock-item { background: rgba(255,255,255,0.02); border-radius: 18px; padding: 18px; margin-bottom: 12px; border: 1px solid var(--border); }
        .chart-dropdown { display: none; margin-top: 15px; text-align: center; }
        .chart-dropdown.active { display: block; }
        .chart-img { width: 100%; border-radius: 10px; filter: invert(93%) hue-rotate(180deg) brightness(1.05) contrast(1.1); }
        
        .period-selector { display: flex; justify-content: center; gap: 8px; margin-bottom: 12px; }
        .period-btn { background: rgba(255,255,255,0.05); border: 1px solid var(--border); color: var(--text-sub); padding: 6px 16px; border-radius: 20px; font-size: 0.85rem; cursor: pointer; font-weight: 600; }

        .action-btn { flex: 1; padding: 8px 0; border-radius: 8px; font-weight: 700; font-size: 0.8rem; cursor: pointer; border: none; text-align: center; }

    function searchLocalStock(query) {
        const list = document.getElementById('autocompleteList');
        if (!query || query.trim() === '') { list.style.display = 'none'; return; }

        const lowerQuery = query.toLowerCase();
        const results = localStockDB.filter(stock => 
            stock.name.toLowerCase().includes(lowerQuery) || stock.code.toLowerCase().includes(lowerQuery)
        );

        if (results.length > 0) {
            list.innerHTML = results.map(item => {
                const displayCode = item.code.includes('@') ? item.code.split('@')[1] : item.code;
                return `<div class="autocomplete-item" onclick="selectStock('${item.name}', '${item.code}')">
                            <span style="font-weight:700; color:white;">${item.name}</span>
                            <span class="stock-code-tag">${displayCode}</span>
                        </div>`
            }).join('');
        } else {
            list.innerHTML = `<div class="search-status">목록에 없습니다.<br>종목코드(숫자 또는 영어)를 직접 적어주세요.</div>`;
        }
        list.style.display = 'block';
    }

    function selectStock(name, code) {

    async function fetchWithFallback(targetUrl) {
        const proxies = [
            `https://api.allorigins.win/raw?url=${encodeURIComponent(targetUrl)}`,
            `https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(targetUrl)}`,
            `https://corsproxy.io/?${encodeURIComponent(targetUrl)}`
        ];
        for (let proxy of proxies) {
            try {
                const res = await fetch(proxy, { cache: 'no-cache' });
                if (res.ok) {
                    const text = await res.text();
                    return JSON.parse(text);
                }
            } catch (e) { console.log("프록시 실패:", proxy); }
        }
        throw new Error("차단됨");
    }

    async function updateExchangeRate() {
        try {
            const url = `https://query1.finance.yahoo.com/v8/finance/chart/KRW=X?interval=1d&range=1d`;
            const data = await fetchWithFallback(url);
            const parsed = data.contents ? JSON.parse(data.contents) : data;
            if (parsed && parsed.chart && parsed.chart.result && parsed.chart.result.length > 0) {
                currentExchangeRate = parsed.chart.result[0].meta.regularMarketPrice;
            }
        } catch(e) { console.log("환율 업데이트 실패, 기본값 유지"); }
    }

    async function getRealTimeData(code) {
        const ticker = code.includes('@') ? code.split('@')[1] : code;
        const isUS = /[A-Z]/.test(ticker);

        if (!isUS) {
            const url = `https://m.stock.naver.com/api/stock/${ticker}/basic`;
            const data = await fetchWithFallback(url);
            const parsed = data.contents ? JSON.parse(data.contents) : data;
            return {
                price: parseInt(parsed.closePrice.replace(/,/g, '')),
                name: parsed.stockName || ticker
            };
        } else {
            const url = `https://query1.finance.yahoo.com/v8/finance/chart/${ticker}?interval=1d&range=1d`;
            const data = await fetchWithFallback(url);
            const parsed = data.contents ? JSON.parse(data.contents) : data;
            
            if (parsed && parsed.chart && parsed.chart.result && parsed.chart.result.length > 0) {
                const meta = parsed.chart.result[0].meta;
                return {
                    price: parseFloat(meta.regularMarketPrice.toFixed(2)),
                    name: ticker 
                };
            } else {
                throw new Error("미국 주식 시세 파싱 실패");
            }
        }
    }

    async function updateAllPricesOnLoad() {
        if(myStocks.length === 0) return;
        const btn = document.getElementById('refreshBtn');
        btn.innerText = "⏳ 갱신중";
        
        await updateExchangeRate(); 
        
        let isUpdated = false;
        for (let i = 0; i < myStocks.length; i++) {
            try {
                const stockData = await getRealTimeData(myStocks[i].code);
                if(stockData && stockData.price !== myStocks[i].currentPrice) {
                    myStocks[i].currentPrice = stockData.price;
                    isUpdated = true;
                }
            } catch(e) { console.log("자동 갱신 실패:", myStocks[i].name); }
        }
        
        if(isUpdated) {
            localStorage.setItem('myStocks', JSON.stringify(myStocks));
        }
        renderList(); 
        btn.innerText = "🔄 갱신";
    }

    async function addStock() {
        let name = document.getElementById('sName').value.trim();
        let codeInput = document.getElementById('sCode').value.trim().toUpperCase(); 
        const avg = parseFloat(document.getElementById('sAvg').value);
        const qty = parseFloat(document.getElementById('sQty').value) || 1;

        if(!name && !codeInput) return alert("종목명이나 종목코드 중 하나는 꼭 적어주세요!");
        if(isNaN(avg)) return alert("평단가를 적어주세요!");

        if(!codeInput && name) {
            codeInput = name; 
        }

        const btn = document.getElementById('addBtn');
        btn.innerText = "정보 확인 중...";
        btn.disabled = true;

        let currentPrice = 0;
        const ticker = codeInput.includes('@') ? codeInput.split('@')[1] : codeInput;
        const isUS = /[A-Z]/.test(ticker); 

        try {
            const stockData = await getRealTimeData(codeInput);
            currentPrice = stockData.price;
            
            if(!name || name === codeInput) {
                name = stockData.name;
            }
        } catch (e) {
            if(!name) name = codeInput; 
            const currSymbol = isUS ? '달러($)' : '원';
            const manualPrice = prompt(`방화벽으로 인해 가격을 불러오지 못했습니다.\n'${name}'의 현재가를 ${currSymbol} 단위로 직접 적어주세요!`);
            if(manualPrice) currentPrice = parseFloat(manualPrice.replace(/,/g, ''));
            else { btn.innerText = "포트폴리오에 저장"; btn.disabled = false; return; }
        }

        if(isNaN(currentPrice)) currentPrice = avg; 

        myStocks.push({ name, code: codeInput, avgPrice: avg, quantity: qty, currentPrice });
        localStorage.setItem('myStocks', JSON.stringify(myStocks));
        renderList();
        
        document.getElementById('sName').value = ''; document.getElementById('sCode').value = ''; 
        document.getElementById('sAvg').value = ''; document.getElementById('sQty').value = '';
        btn.innerText = "포트폴리오에 저장"; btn.disabled = false;
    }

    async function refreshAllPrices() {
        if(myStocks.length === 0) return;
        document.getElementById('refreshBtn').innerText = "⏳";
        
        await updateExchangeRate(); 
        
        for (let i = 0; i < myStocks.length; i++) {
            try {
                const stockData = await getRealTimeData(myStocks[i].code);
                myStocks[i].currentPrice = stockData.price;
            } catch(e) {}
        }
        localStorage.setItem('myStocks', JSON.stringify(myStocks));
        renderList();
        document.getElementById('refreshBtn').innerText = "🔄 갱신";
    }

    function getChartUrl(code, period = 'day') {
        const ts = Date.now();
        const isUS = /[a-zA-Z]/.test(code);
        if (!isUS) {
            return `https://ssl.pstatic.net/imgfinance/chart/item/candle/${period}/${code}.png?${ts}`;
        } else {
            let chartCode = code.includes('@') ? code : `NAS@${code.toUpperCase()}`;
            return `https://ssl.pstatic.net/imgfinance/chart/world/candle/${period}/${chartCode}.png?${ts}`;
        }
    }

    function toggleChart(idx) { document.getElementById(`chart-${idx}`).classList.toggle('active'); }
    
    function changePeriod(idx, code, period, btnEl) {
        document.getElementById(`chart-img-${idx}`).src = getChartUrl(code, period);
        document.getElementById(`chart-${idx}`).querySelectorAll('.period-btn').forEach(b => b.classList.remove('active'));
        btnEl.classList.add('active');
    }

    function renderList() {
        const container = document.getElementById('stockListContainer');
        container.innerHTML = '';
        
        if(myStocks.length === 0) { 
            container.innerHTML = '<div style="text-align:center; padding:40px; color:var(--text-sub);">등록된 종목이 없습니다.</div>'; 
            document.getElementById('totalYieldDisplay').innerText = '0.00%'; 
            document.getElementById('totalYieldDisplay').style.color = 'white'; 
            document.getElementById('totalInvDisplay').innerText = '0원';
            document.getElementById('totalPlDisplay').innerText = '0원';
            document.getElementById('totalPlDisplay').style.color = 'white';
            document.getElementById('exRateDisplay').innerText = '';
            return; 
        }
        
        let totalInvKRW = 0, totalCurKRW = 0;
        
        myStocks.forEach((s, i) => {
            const isUS = /[a-zA-Z]/.test(s.code);
            const currSymbol = isUS ? '$' : '원';
            
            const itemInvOriginal = s.avgPrice * s.quantity;
            const itemCurOriginal = s.currentPrice * s.quantity;
            const itemPLOriginal = itemCurOriginal - itemInvOriginal;
            
            if (isUS) {
                totalInvKRW += (itemInvOriginal * currentExchangeRate);
                totalCurKRW += (itemCurOriginal * currentExchangeRate);
            } else {
                totalInvKRW += itemInvOriginal;
                totalCurKRW += itemCurOriginal;
            }

            const pr = (((s.currentPrice - s.avgPrice) / s.avgPrice) * 100).toFixed(2);
            const color = pr > 0 ? 'var(--red)' : 'var(--blue)';
            const bg = pr > 0 ? 'rgba(244, 63, 94, 0.15)' : 'rgba(59, 130, 246, 0.15)';
            const sign = pr > 0 ? '+' : '';

            const priceDisp = isUS ? s.currentPrice.toLocaleString(undefined, {minimumFractionDigits: 2}) + currSymbol : s.currentPrice.toLocaleString() + currSymbol;
            const avgDisp = isUS ? s.avgPrice.toLocaleString(undefined, {minimumFractionDigits: 2}) + currSymbol : s.avgPrice.toLocaleString() + currSymbol;

            const itemCurDisp = isUS ? itemCurOriginal.toLocaleString(undefined, {minimumFractionDigits: 2}) + currSymbol : Math.floor(itemCurOriginal).toLocaleString() + currSymbol;
            const itemPLDisp = isUS ? Math.abs(itemPLOriginal).toLocaleString(undefined, {minimumFractionDigits: 2}) + currSymbol : Math.floor(Math.abs(itemPLOriginal)).toLocaleString() + currSymbol;
            const plSign = itemPLOriginal > 0 ? '+' : (itemPLOriginal < 0 ? '-' : '');

            container.innerHTML += `
                <div class="stock-item">
                    <div style="cursor:pointer;" onclick="toggleChart(${i})">
                        <div style="display:flex; justify-content:space-between; align-items:center;">
                            <div>
                                <div style="font-weight:800; font-size:1.1rem; color:white;">${s.name} <span style="font-size:0.8rem; color:var(--text-sub); font-weight:normal;">▼</span></div>
                                <div style="font-size:0.85rem; color:var(--text-sub);">평단 ${avgDisp} (x${s.quantity})</div>
                            </div>
                            <div style="text-align:right;">
                                <div style="font-weight:800; color:${color}">${priceDisp}</div>
                                <div style="font-size:0.85rem; font-weight:700; color:${color}; background:${bg}; padding:3px 8px; border-radius:6px; display:inline-block; margin-top:4px;">${sign}${pr}%</div>
                            </div>
                        </div>
                        <div style="display:flex; justify-content:space-between; align-items:center; margin-top: 12px; padding-top: 12px; border-top: 1px dashed rgba(255,255,255,0.1); font-size: 0.9rem;">
                            <div style="color:var(--text-sub);">평가금액: <span style="color:white; font-weight:bold;">${itemCurDisp}</span></div>
                            <div style="color:var(--text-sub);">평가손익: <span style="color:${color}; font-weight:bold;">${plSign}${itemPLDisp}</span></div>
                        </div>
                    </div>
                    <div class="chart-dropdown" id="chart-${i}">
                        <div class="period-selector">
                            <button class="period-btn active" onclick="changePeriod(${i}, '${s.code}', 'day', this); event.stopPropagation();">일봉</button>
                            <button class="period-btn" onclick="changePeriod(${i}, '${s.code}', 'week', this); event.stopPropagation();">주봉</button>
                            <button class="period-btn" onclick="changePeriod(${i}, '${s.code}', 'month', this); event.stopPropagation();">월봉</button>
                        </div>
                        <img src="${getChartUrl(s.code, 'day')}" class="chart-img" id="chart-img-${i}">
                        <div class="actions">
                            <button class="action-btn" style="background:rgba(16, 185, 129, 0.15); color:#34d399;" onclick="openWater(${i}); event.stopPropagation();">💧 물타기</button>
                            <button class="action-btn" style="background:rgba(99, 102, 241, 0.15); color:#818cf8;" onclick="openA(${i}); event.stopPropagation();">수정/진단🔍</button>
                            <button class="action-btn" style="background:rgba(255, 255, 255, 0.05); color:var(--text-sub);" onclick="delStock(${i}); event.stopPropagation();">삭제</button>
                        </div>
                    </div>
                </div>`;
        });
        
        const totalPr = (((totalCurKRW - totalInvKRW) / totalInvKRW) * 100).toFixed(2);
        document.getElementById('totalYieldDisplay').innerText = `${totalPr > 0 ? '+' : ''}${totalPr}%`;
        document.getElementById('totalYieldDisplay').style.color = totalPr > 0 ? 'var(--red)' : 'var(--blue)';

        const totalPLAmountKRW = totalCurKRW - totalInvKRW;
        document.getElementById('totalInvDisplay').innerText = Math.floor(totalInvKRW).toLocaleString() + "원";
        document.getElementById('totalPlDisplay').innerText = `${totalPLAmountKRW > 0 ? '+' : ''}${Math.floor(totalPLAmountKRW).toLocaleString()}원`;
        document.getElementById('totalPlDisplay').style.color = totalPLAmountKRW > 0 ? 'var(--red)' : 'var(--blue)';
        
        document.getElementById('exRateDisplay').innerText = `(적용환율: ${currentExchangeRate.toLocaleString(undefined, {maximumFractionDigits:1})}원)`;
    }

    function delStock(idx) { if(confirm("삭제하시겠습니까?")) { myStocks.splice(idx, 1); localStorage.setItem('myStocks', JSON.stringify(myStocks)); renderList(); } }
    function closeModals() { document.querySelectorAll('.modal, .modal-overlay').forEach(m => m.style.display = 'none'); }

    function openA(i) {
        curIdx = i; const s = myStocks[i];
        document.getElementById('aTitle').innerText = s.name;
        document.getElementById('aSubtitle').innerText = `수익률: ${(((s.currentPrice-s.avgPrice)/s.avgPrice)*100).toFixed(2)}%`;
        
        document.getElementById('uCode').value = s.code.includes('@') ? s.code.split('@')[1] : s.code; 
        document.getElementById('uAvg').value = s.avgPrice; 
        document.getElementById('uQty').value = s.quantity; 
        document.getElementById('uPrice').value = s.currentPrice;
        
        document.getElementById('overlay').style.display = 'block'; document.getElementById('aModal').style.display = 'block';
    }

    function updatePrice() {
        const uCode = document.getElementById('uCode').value.toUpperCase();
        if(/[A-Z]/.test(uCode) && !uCode.includes('@')) {
            myStocks[curIdx].code = `NAS@${uCode}`;
        } else {
            myStocks[curIdx].code = uCode;
        }
        
        myStocks[curIdx].avgPrice = parseFloat(document.getElementById('uAvg').value) || myStocks[curIdx].avgPrice;
        myStocks[curIdx].quantity = parseFloat(document.getElementById('uQty').value) || myStocks[curIdx].quantity;
        myStocks[curIdx].currentPrice = parseFloat(document.getElementById('uPrice').value) || myStocks[curIdx].currentPrice;
        
        localStorage.setItem('myStocks', JSON.stringify(myStocks)); 
        renderList(); 
        closeModals();
    }

    function askGemini() {
        const s = myStocks[curIdx];
        const isUS = /[a-zA-Z]/.test(s.code);
        const curr = isUS ? '달러' : '원';
        
        const txt = `전문 애널리스트로서 현재 보유 중인 [${s.name}] 주식에 대한 심층 분석 리포트를 작성해 줘.

[나의 투자 현황]
- 매수 평단가: ${s.avgPrice}${curr}
- 보유 수량: ${s.quantity}주
- 현재 주가: ${s.currentPrice}${curr}

위 현황을 바탕으로 다음 4가지 관점을 종합하여 상세한 전망과 맞춤형 대응 전략을 분석해 줘:
1. 거시 경제: 현재 글로벌 및 한국의 경제 상황(금리, 인플레이션 등)이 이 종목에 미치는 영향
2. 정치/국제 정세: 주요 국가의 정책이나 지정학적 리스크가 미치는 영향
3. 산업 트렌드: 이 기업이 속한 섹터의 최신 시장 트렌드와 미래 전망
4. 맞춤형 전략: 내 평단가와 수익률 상황을 고려했을 때의 구체적인 대응 전략 (추가 매수, 홀딩, 부분 매도 등)과 목표가/손절가 제시

최대한 논리적이고 가독성 좋게, 실제 증권사 리포트처럼 작성해 줘.`;

        navigator.clipboard.writeText(txt).then(() => { 
            alert("✨ 심층 분석용 전문가 프롬프트가 복사되었습니다!\\n\\nGemini 채팅창에 그대로 붙여넣기 하시면 엄청난 리포트가 나올 거예요."); 
            window.open('https://gemini.google.com/', '_blank'); 
        });
    }

    function openWater(i) {
        curIdx = i; const s = myStocks[i];
        const isUS = /[a-zA-Z]/.test(s.code);
        const curr = isUS ? '$' : '원';
        const priceDisp = isUS ? s.currentPrice.toLocaleString(undefined, {minimumFractionDigits: 2}) : s.currentPrice.toLocaleString();
        document.getElementById('wDesc').innerText = `${s.name} (현재가: ${priceDisp}${curr})`;
        document.getElementById('addMoney').placeholder = `추가 투자할 금액 (${curr})`;
        document.getElementById('overlay').style.display = 'block'; document.getElementById('waterModal').style.display = 'block';
    }

    function calcWater() {
        const money = parseFloat(document.getElementById('addMoney').value); const s = myStocks[curIdx];
        if(!money) return document.getElementById('wResult').style.display = 'none';
        const isUS = /[a-zA-Z]/.test(s.code);
        const curr = isUS ? '$' : '원';

        const addQty = Math.floor(money / s.currentPrice);
        const newAvg = (s.avgPrice * s.quantity + addQty * s.currentPrice) / (s.quantity + addQty);
        const newAvgDisp = isUS ? newAvg.toFixed(2) : Math.floor(newAvg).toLocaleString();

        document.getElementById('wNewAvg').innerText = `${newAvgDisp}${curr}`;
        document.getElementById('wBuyQty').innerText = `✅ ${addQty.toLocaleString()}주 추가 매수 가능`;
        document.getElementById('wResult').style.display = 'block';
    }
</script>
</body>
</html>
